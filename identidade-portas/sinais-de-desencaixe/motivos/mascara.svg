<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- os 7 sinais de desencaixe | a mascara | espelhos, reflexos, vidros | o reflexo que atravessa o vidro -->
  <g id="mascara" fill="none" stroke="var(--porta-wood, #A67C52)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect id="mascara-moldura" x="34" y="18" width="32" height="56" rx="6" pathLength="1"/>
    <line id="mascara-suporte" x1="50" y1="74" x2="50" y2="84" pathLength="1"/>
    <line id="mascara-base" x1="42" y1="84" x2="58" y2="84" pathLength="1"/>
  </g>
  <g id="mascara-reflexo" fill="none" stroke="var(--porta-horizon, #D8B07C)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <line id="mascara-brilho-1" x1="41" y1="28" x2="55" y2="60" pathLength="1"/>
    <line id="mascara-brilho-2" x1="47" y1="26" x2="59" y2="52" pathLength="1"/>
  </g>
</svg>
