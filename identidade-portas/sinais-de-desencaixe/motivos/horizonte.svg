<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- os 7 sinais de desencaixe | o horizonte | janelas, mar, distancia | a linha ao longe, vista da janela -->
  <g id="horizonte-janela" fill="none" stroke="var(--porta-wood, #A67C52)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect id="horizonte-caixilho" x="26" y="20" width="48" height="56" rx="3" pathLength="1"/>
    <line id="horizonte-montante" x1="50" y1="20" x2="50" y2="76" pathLength="1"/>
    <line id="horizonte-travessa" x1="26" y1="48" x2="74" y2="48" pathLength="1"/>
  </g>
  <line id="horizonte-linha" x1="26" y1="58" x2="74" y2="58" fill="none" stroke="var(--porta-blue, #7D8797)" stroke-width="2.5" stroke-linecap="round" pathLength="1"/>
  <circle id="horizonte-sol" cx="60" cy="38" r="4" fill="var(--porta-horizon, #D8B07C)"/>
</svg>
