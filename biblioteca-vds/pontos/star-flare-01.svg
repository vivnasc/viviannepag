      :root { --vds-gold: #c9a15e; --vds-gold-soft: #d9bd8a; }
    </style>
    <radialGradient id="fg"><stop offset="0%" stop-color="var(--vds-gold-soft, #d9bd8a)"/><stop offset="100%" stop-color="var(--vds-gold-soft, #d9bd8a)" stop-opacity="0"/></radialGradient>
  </defs>
  <circle cx="50" cy="50" r="20" fill="url(#fg)"/>
  <path id="star" d="M50 14 C 53 45, 55 47, 86 50 C 55 53, 53 55, 50 86 C 47 55, 45 53, 14 50 C 45 47, 47 45, 50 14 Z" fill="var(--vds-gold-soft, #d9bd8a)"/>
