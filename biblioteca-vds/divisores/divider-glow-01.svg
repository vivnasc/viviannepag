<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- divider-glow-01 | divisores | brilho central | animar: brilho a atravessar -->
  <defs>
    <style>
      :root { --vds-gold: #c9a15e; --vds-gold-soft: #d9bd8a; }
    </style>
    <linearGradient id="dg"><stop offset="0%" stop-color="var(--vds-gold, #c9a15e)" stop-opacity="0"/><stop offset="50%" stop-color="var(--vds-gold, #c9a15e)"/><stop offset="100%" stop-color="var(--vds-gold, #c9a15e)" stop-opacity="0"/></linearGradient>
  </defs>
  <line id="line" x1="20" y1="30" x2="180" y2="30" stroke="url(#dg)" stroke-width="1.4" stroke-linecap="round" pathLength="1"/>
  <circle id="dot" cx="100" cy="30" r="2.4" fill="var(--vds-gold-soft, #d9bd8a)"/>
</svg>
