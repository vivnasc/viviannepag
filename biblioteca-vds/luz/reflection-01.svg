  <g id="reflection" fill="none" stroke="var(--vds-gold, #c9a15e)" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="42" x2="80" y2="42"/>
    <line x1="26" y1="52" x2="74" y2="52" opacity="0.5"/>
    <line x1="32" y1="60" x2="68" y2="60" opacity="0.28"/>
  </g>
