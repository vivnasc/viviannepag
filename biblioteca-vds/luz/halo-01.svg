    <radialGradient id="hg"><stop offset="60%" stop-color="var(--vds-gold-soft, #d9bd8a)" stop-opacity="0"/><stop offset="82%" stop-color="var(--vds-gold-soft, #d9bd8a)" stop-opacity="0.7"/><stop offset="100%" stop-color="var(--vds-gold-soft, #d9bd8a)" stop-opacity="0"/></radialGradient>
