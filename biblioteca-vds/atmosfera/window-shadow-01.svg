<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- window-shadow-01 | atmosfera | sombra de janela | animar: deslize lento -->
  <defs>
    <style>
      :root { --vds-bg: #1c1610; }
    </style>
    <linearGradient id="ws" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--vds-bg, #1c1610)" stop-opacity="0"/><stop offset="100%" stop-color="var(--vds-bg, #1c1610)" stop-opacity="0.55"/></linearGradient>
  </defs>
  <g transform="rotate(-24 50 50)" opacity="0.5">
    <rect x="-20" y="18" width="140" height="12" fill="var(--vds-bg, #1c1610)"/>
    <rect x="-20" y="44" width="140" height="12" fill="var(--vds-bg, #1c1610)"/>
    <rect x="-20" y="70" width="140" height="12" fill="var(--vds-bg, #1c1610)"/>
  </g>
  <rect width="100" height="100" fill="url(#ws)"/>
</svg>
