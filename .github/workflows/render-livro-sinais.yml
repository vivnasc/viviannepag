name: Render livro (Os 7 Sinais de Desencaixe)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm packages
        run: npm install --no-save playwright @supabase/supabase-js

      - name: Install Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Download da capa da Vivianne (a imagem que ela carregou no admin)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          mkdir -p sinais-capa
          B="$SUPABASE_URL/storage/v1/object/public/viviannepag-assets/livro-pilar/os-7-sinais"
          curl -fsS "$B/capa-composta.png" -o sinais-capa/capa-pt.png && echo "capa PT ok" || echo "sem capa PT"
          # EN: usa a capa EN se existir; senão, a mesma capa PT
          curl -fsS "$B/capa-composta-en.png" -o sinais-capa/capa-en.png && echo "capa EN ok" \
            || ( [ -f sinais-capa/capa-pt.png ] && cp sinais-capa/capa-pt.png sinais-capa/capa-en.png && echo "capa EN = PT" || echo "sem capa EN" )

      - name: Render do livro (PT e EN) com a tua capa
        run: |
          SINAIS_COVER=sinais-capa/capa-pt.png node build/build-book.mjs pt
          SINAIS_COVER=sinais-capa/capa-en.png node build/build-book.mjs en
          ls -la Os-7-Sinais-de-Desencaixe.pdf The-Seven-Signs-of-Not-Belonging.pdf

      - name: Publicar os PDFs na entrega da loja (Supabase)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/livro-sinais/upload-supabase.js
