name: Render livro (Os 7 Sinais de Desencaixe)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm packages
        run: npm install --no-save playwright @supabase/supabase-js

      - name: Install Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Render do livro (PT e EN)
        run: |
          node build/build-book.mjs pt
          node build/build-book.mjs en
          ls -la Os-7-Sinais-de-Desencaixe.pdf The-Seven-Signs-of-Not-Belonging.pdf

      - name: Publicar na entrega da loja (Supabase)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/livro-sinais/upload-supabase.js
