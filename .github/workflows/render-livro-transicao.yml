name: Render livro A Grande Transição

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/livro-transicao/.disparar']

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libpango-1.0-0 libxcomposite1 libxdamage1 \
            libxrandr2 libxfixes3 libxkbcommon0 libasound2t64 \
            libxshmfence1 fonts-liberation libu2f-udev

      - name: Install npm packages
        run: |
          npm install --no-save \
            puppeteer \
            marked \
            @supabase/supabase-js \
            @fontsource/fraunces \
            @fontsource/outfit

      - name: Render do livro (miolo + capa + vinhetas do bucket)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: node scripts/livro-transicao/render.js

      - name: Publicar o PDF no bucket
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/livro-transicao/upload-supabase.js
