name: Render romance (Biblioteca de Véspera)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug do romance'
        required: false
        type: string
        default: 'rom-01-amparo'
  push:
    branches: [main]
    paths: ['scripts/romances/.disparar']

env:
  SLUG: ${{ github.event.inputs.slug || 'rom-01-amparo' }}

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libpango-1.0-0 libxcomposite1 libxdamage1 \
            libxrandr2 libxfixes3 libxkbcommon0 libasound2t64 \
            libxshmfence1 fonts-liberation libu2f-udev

      - name: Install npm packages
        run: |
          npm install --no-save \
            puppeteer \
            marked \
            pdf-lib \
            @supabase/supabase-js \
            @fontsource/fraunces \
            @fontsource/outfit

      - name: Download capa escolhida
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          curl -fsS "$SUPABASE_URL/storage/v1/object/public/viviannepag-assets/romances/$SLUG/capa.jpg" -o /tmp/capa-escolhida.jpg
          ls -la /tmp/capa-escolhida.jpg

      - name: Compor capas (pt e en)
        run: |
          node scripts/romances/capa-compor.js /tmp/capa-escolhida.jpg pt ficcao-plano/AMPARO-capa-pt.png
          node scripts/romances/capa-compor.js /tmp/capa-escolhida.jpg en ficcao-plano/AMPARO-capa-en.png

      - name: Render livros (pt e en)
        run: |
          node scripts/romances/render-livro.js pt
          node scripts/romances/render-livro.js en

      - name: Publicar no bucket (botões de download da Editora)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/romances/upload-supabase.js

      - name: Commit dos PDFs e capas ao repo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add ficcao-plano/AS-MAOS-DE-AMPARO-pt.pdf ficcao-plano/AMPAROS-HANDS-en.pdf ficcao-plano/AMPARO-capa-pt.png ficcao-plano/AMPARO-capa-en.png
          git diff --cached --quiet || git commit -m 'Render romance: PDFs finais com a capa escolhida [skip ci]'
          git push
