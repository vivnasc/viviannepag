name: Render carrossel 7 Veus (MP4)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug da coleccao (ex: semana-1-freeme-mae)'
        required: true
        type: string
      siteUrl:
        description: 'URL publica do site'
        required: true
        type: string
      dias:
        description: 'Filtro de dias (ex: "1" ou "1,3,5"). Vazio = todos'
        required: false
        type: string
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ffmpeg
        timeout-minutes: 20
        run: |
          # se o runner já trouxer ffmpeg, não toca no apt. Senão instala com RETRIES
          # (o mirror azure.archive às vezes fica lento) e --no-install-recommends
          # (menos pacotes = menos hipótese de pendurar). 20 min de margem para não
          # cortar um download lento mas a progredir (o timeout curto fazia falhar).
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg já presente: $(ffmpeg -version | head -1)"
            exit 0
          fi
          for i in 1 2 3; do
            echo "::group::tentativa $i de instalar ffmpeg"
            sudo apt-get update -o Acquire::Retries=3 && \
            sudo apt-get install -y --no-install-recommends ffmpeg && { echo "::endgroup::"; break; }
            echo "::endgroup::"; echo "falhou a tentativa $i; espera e repete…"; sleep 20
          done
          command -v ffmpeg >/dev/null 2>&1 || { echo "ffmpeg não instalou após 3 tentativas"; exit 1; }

      - name: Install npm packages
        run: npm install --no-save puppeteer @supabase/supabase-js

      - name: Render carrossel MP4
        env:
          SITE_URL: ${{ github.event.inputs.siteUrl }}
          SLUG: ${{ github.event.inputs.slug }}
          DIAS_FILTER: ${{ github.event.inputs.dias }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/render-carrossel-veus.js
