name: Render ebook editorial PDF

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug do ebook (ex: ebook-01-culpa). Vazio ou ALL = todos.'
        required: false
        type: string
        default: 'ALL'
      slugs:
        description: 'Lista de slugs separados por virgula (override do campo slug)'
        required: false
        type: string
        default: ''
      mundo:
        description: 'Mundo (freeme, infonte, synchim, escola, autora). Usa "auto" para auto-detectar por slug.'
        required: false
        type: string
        default: 'auto'
      colecao:
        description: 'Universo a renderizar de cada vez (lote mais leve): freeme-mae | infonte | amor | forca | prosperidade | pertenca | trabalho. Vazio = todos.'
        required: false
        type: string
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libpango-1.0-0 libxcomposite1 libxdamage1 \
            libxrandr2 libxfixes3 libxkbcommon0 libasound2t64 \
            libxshmfence1 fonts-liberation libu2f-udev

      - name: Install npm packages
        run: |
          npm install --no-save \
            puppeteer \
            @supabase/supabase-js \
            gray-matter \
            marked

      - name: Render ebook(s)
        env:
          SLUG: ${{ github.event.inputs.slug }}
          SLUGS: ${{ github.event.inputs.slugs }}
          MUNDO: ${{ github.event.inputs.mundo }}
          COLECAO: ${{ github.event.inputs.colecao }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/render-ebook.js
