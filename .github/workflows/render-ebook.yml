name: Render ebook editorial PDF

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug do ebook (ex: ebook-01-culpa)'
        required: true
        type: string
        default: 'ebook-01-culpa'
      mundo:
        description: 'Mundo das imagens MJ (freeme, infonte, synchim, escola, autora)'
        required: true
        type: string
        default: 'freeme'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libpango-1.0-0 libxcomposite1 libxdamage1 \
            libxrandr2 libxfixes3 libxkbcommon0 libasound2t64 \
            libxshmfence1 fonts-liberation libu2f-udev

      - name: Install npm packages
        run: |
          npm install --no-save \
            puppeteer \
            @supabase/supabase-js \
            gray-matter \
            marked

      - name: Render ebook
        env:
          SLUG: ${{ github.event.inputs.slug }}
          MUNDO: ${{ github.event.inputs.mundo }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/render-ebook.js
