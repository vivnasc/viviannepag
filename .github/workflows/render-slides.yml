name: Render slides bulk

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: 'ID unico do job'
        required: true
        type: string
      siteUrl:
        description: 'URL publica do site (ex: https://viviannepag.vercel.app)'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libpango-1.0-0 libxcomposite1 libxdamage1 \
            libxrandr2 libxfixes3 libxkbcommon0 libasound2t64 \
            libxshmfence1 fonts-liberation libu2f-udev

      - name: Install npm packages
        run: |
          npm install --no-save \
            puppeteer \
            jszip \
            @supabase/supabase-js

      - name: Render bulk
        env:
          SITE_URL: ${{ github.event.inputs.siteUrl }}
          JOB_ID: ${{ github.event.inputs.jobId }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VIVIANNEPAG_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/render-slides-bulk.js
